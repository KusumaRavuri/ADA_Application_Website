<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>{% block title %}ADA Application Portal{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Syne:wght@600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="glass-nav">
    <div class="container-fluid px-4 d-flex align-items-center justify-content-between" style="height:64px;">
      <a href="/" class="nav-brand">
        <img src="{{ url_for('static', filename='img/ada_logo.png') }}" alt="ADA Logo" style="height:48px;width:48px;object-fit:contain;border-radius:50%;margin-right:10px;"/>
        <span class="brand-text">ADA<span class="brand-accent">Portal</span></span>
      </a>
      <div class="nav-links">
        <a href="/" class="nav-link-item {% if request.endpoint=='index' %}active{% endif %}">Home</a>
        <a href="/apply" class="nav-link-item {% if request.endpoint=='apply' %}active{% endif %}">Apply</a>
        <a href="/admin" class="nav-link-item {% if request.endpoint=='admin' %}active{% endif %}">Admin</a>
      </div>
    </div>
  </nav>
  <main>{% block content %}{% endblock %}</main>
  <footer class="site-footer">
    <div class="container text-center">
      <p class="mb-0 footer-text">© 2024 Aeronautical Development Agency &nbsp;·&nbsp; Application Portal &nbsp;·&nbsp; All rights reserved</p>
    </div>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
