{% extends "base.html" %}
{% block title %}Re-download PDF — ADA Portal{% endblock %}
{% block content %}
<div class="success-wrapper">
  <div class="success-card glass-card">
    <div style="font-size:3rem;color:var(--blue-400);"><i class="bi bi-file-earmark-arrow-down"></i></div>
    <h2 class="success-title mt-3">Re-download Your Application PDF</h2>
    <p class="success-msg">Enter your Application ID to download your application PDF.</p>
    {% if error %}
    <div class="alert alert-danger mt-3">{{ error }}</div>
    {% endif %}
    <form method="POST" action="/redownload" class="mt-4" style="max-width:400px;margin:auto;">
      <label class="form-label fw-semibold">Application ID</label>
      <input type="text" name="app_id" class="form-control glass-input mb-3" placeholder="e.g. ADA202600001" required/>
      <button type="submit" class="btn-primary-glass w-100"><i class="bi bi-download me-2"></i>Download PDF</button>
    </form>
    <div class="mt-4">
      <a href="/" class="btn-secondary-glass"><i class="bi bi-house me-2"></i>Home</a>
    </div>
  </div>
</div>
{% endblock %}
